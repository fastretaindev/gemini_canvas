<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>財務發票解析系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "lucide-react": "https://esm.sh/lucide-react"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Upload, FileText, Loader2, Trash2, Download, List, 
      FileSpreadsheet, AlertCircle, ChevronDown, 
      ChevronUp, ShieldCheck, TrendingUp, PieChart
    } from 'lucide-react';

    // --- Configuration ---
    const PDFJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    const PDFJS_WORKER_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // --- Logic: Data Sanitization ---
    function toNumber(v) {
      if (!v) return null;
      if (typeof v === 'number') return v;
      let s = v.trim();
      s = s.replace(/[$,]/g, ""); 
      
      if ((s.match(/\./g) || []).length > 1) {
        s = s.replace(/\.(?=.*\.)/g, "");
      }
      
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }

    function groupTextItemsToLines(items) {
      const linesMap = new Map();
      const lineTolerance = 4;

      for (const item of items) {
        const transform = item.transform;
        const y = transform[5];
        const x = transform[4];
        const text = item.str || "";

        let key = [...linesMap.keys()].find(k => Math.abs(k - y) <= lineTolerance);
        if (key === undefined) key = y;

        const arr = linesMap.get(key) || [];
        arr.push({ x, text });
        linesMap.set(key, arr);
      }

      return Array.from(linesMap.entries())
        .sort((a, b) => b[0] - a[0])
        .map(([_, arr]) => {
          return arr.sort((a, b) => a.x - b.x).map(t => t.text).join(" ");
        });
    }

    function pickAmount(text, labelPattern) {
      const re = new RegExp(`${labelPattern}\\D*?([\\d,.]+)`);
      const m = text.match(re)?.[1] ?? null;
      return m ? toNumber(m) : null;
    }

    function pickSellerBlock(text) {
      const m = text.match(/(?:營\s*業\s*人|賣\s*方)\s*[:：][\s\S]{0,300}/);
      return m?.[0] ?? "";
    }

    function parseSeller(text) {
      const block = pickSellerBlock(text);
      let seller_name = block.match(/[:：]\s*([^\n]+)/)?.[1]?.trim() || null;
      const seller_tax_id = block.match(/統\s*一\s*編\s*號\s*[:：.]?\s*(\d{8})/)?.[1] || null;
      return { seller_name, seller_tax_id };
    }

    function pickTaxType(text) {
      const taxBlock = text.match(/營\s*業\s*稅[\s\S]{0,150}/)?.[0] ?? text;
      let taxable = "", zero = "", exempt = "";
      
      if (/應\s*稅\s*[:：]?\s*[VvXx✓√]/.test(taxBlock)) taxable = "V";
      if (/零\s*稅\s*率\s*[:：]?\s*[VvXx✓√]/.test(taxBlock)) zero = "V";
      if (/免\s*稅\s*[:：]?\s*[VvXx✓√]/.test(taxBlock)) exempt = "V";

      if (!taxable && !zero && !exempt) {
         if (/應\s*稅/.test(text) && !/零\s*稅/.test(text) && !/免\s*稅/.test(text)) taxable = "V";
      }
      return taxable ? "V" : (zero ? "Zero" : (exempt ? "")); 
    }

    function parseInvoiceHeader(lines) {
      const fullText = lines.join("\n");
      const mInv = fullText.match(/(?:發\s*票\s*號\s*碼|號\s*碼)[：:.]?\s*([A-Z]{2}[- ]?\d{8})/);
      const invoiceNumber = mInv ? mInv[1].replace(/[- ]/g, '') : "";
      const mFormat = fullText.match(/(?:格\s*式)[：:.]?\s*(\d{2})/);
      const format = mFormat ? mFormat[1] : "";
      const mDate = fullText.match(/(\d{4}[-/]\d{2}[-/]\d{2})/);
      const date = mDate ? mDate[1] : "";
      const { seller_name, seller_tax_id } = parseSeller(fullText);
      const taxStatus = pickTaxType(fullText);

      return {
        invoiceNumber, format, date,
        salesTotal: pickAmount(fullText, "銷\\s*售\\s*額\\s*合\\s*計")?.toString(),
        taxAmount: pickAmount(fullText, "(?:營\\s*業\\s*稅\\s*額|營\\s*業\\s*稅|稅\\s*額)")?.toString(),
        grandTotal: pickAmount(fullText, "總\\s*計")?.toString(),
        sellerId: seller_tax_id || "",
        sellerName: seller_name || "",
        taxTypeTaxable: taxStatus === "V" ? "V" : "",
        taxTypeZero: taxStatus === "Zero" ? "V" : "",
        taxTypeExempt: taxStatus === "Exempt" ? "V" : ""
      };
    }

    function parseItemRow(line) {
      const normalized = line.replace(/\s+/g, " ").trim();
      const regexp = /^(.+)\s+([-]?[\d,.]+)\s+([-]?[$]?[\d,.]+)\s+([-]?[$]?[\d,.]+)(?:\s+(.*))?$/;
      const m = normalized.match(regexp);
      if (!m) return null;
      const cleanName = m[1].replace(/([\u4e00-\u9fa5])\s+([\u4e00-\u9fa5])/g, '$1$2').trim();

      return {
        description: cleanName,
        quantity: m[2],
        unitPrice: m[3].replace(/[$,]/g, ""), 
        amount: m[4].replace(/[$,]/g, ""), 
        remarks: m[5] ? m[5].trim() : ""
      };
    }

    function parseInvoiceDetails(lines, invoiceNumberVal, dateVal) {
      const results = [];
      let startIndex = -1;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes("品") && (lines[i].includes("數") || lines[i].includes("額"))) {
          startIndex = i + 1;
          break;
        }
      }

      if (startIndex !== -1) {
        for (let i = startIndex; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          if (line.match(/(總\s*計|合\s*計|銷\s*售\s*額|營\s*業\s*稅|賣\s*方|統\s*一\s*編\s*號)/)) break;
          const row = parseItemRow(line);
          if (row && !isNaN(Number(row.amount))) {
            results.push({ invoiceNumber: invoiceNumberVal, date: dateVal, ...row });
          }
        }
      }
      return results;
    }

    const extractDataFromPdf = async (file, mode) => {
      const pdfjsLib = window.pdfjsLib;
      if (!pdfjsLib) throw new Error('PDF 核心尚未載入');
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const extractedItems = [];

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const textContent = await page.getTextContent();
        const lines = groupTextItemsToLines(textContent.items);
        const headerData = parseInvoiceHeader(lines);

        if (mode === 'header') {
          if (headerData.invoiceNumber || headerData.grandTotal) {
            extractedItems.push({ ...headerData, pageNumber: pageNum, rawLineString: lines });
          }
        } else {
          const details = parseInvoiceDetails(lines, headerData.invoiceNumber || "", headerData.date || "");
          if (details.length > 0) {
            details.forEach(d => extractedItems.push({ ...d, pageNumber: pageNum, rawLineString: lines }));
          } else if (headerData.invoiceNumber) {
             extractedItems.push({
                 invoiceNumber: headerData.invoiceNumber, date: headerData.date,
                 description: "", quantity: "", unitPrice: "", amount: "",
                 status: 'warning', errorMessage: '未偵測到明細', pageNumber: pageNum, rawLineString: lines
             });
          }
        }
      }
      return extractedItems;
    };

    const Inspector = ({ lines }) => {
      const [isOpen, setIsOpen] = useState(false);
      if (!lines || lines.length === 0) return null;
      return (
        <div className="mt-2 border-t border-gray-100 pt-2">
          <button onClick={() => setIsOpen(!isOpen)} className="flex items-center gap-1 text-xs text-blue-600 font-medium">
            {isOpen ? <ChevronUp className="w-3 h-3" /> : <ChevronDown className="w-3 h-3" />}
            {isOpen ? '隱藏原始資料' : '檢視原始資料'}
          </button>
          {isOpen && (
            <div className="mt-2 p-3 bg-gray-800 text-green-400 font-mono text-xs rounded overflow-x-auto max-h-40">
              {lines.map((l, i) => <div key={i}>{i}: {l}</div>)}
            </div>
          )}
        </div>
      );
    };

    const StatsCard = ({ title, value, icon: Icon, colorClass, iconBgClass }) => (
      <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex items-center gap-4 transition-all hover:shadow-md">
        <div className={`p-4 rounded-2xl ${iconBgClass}`}>
          <Icon className={`w-6 h-6 ${colorClass}`} />
        </div>
        <div>
          <p className="text-sm font-bold text-gray-500 mb-1">{title}</p>
          <h3 className="text-2xl font-black text-slate-800">
            ${(value || 0).toLocaleString()}
          </h3>
        </div>
      </div>
    );

    function App() {
      const [invoices, setInvoices] = useState([]);
      const [files, setFiles] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [mode, setMode] = useState('header');
      const [isPdfReady, setIsPdfReady] = useState(false);

      const stats = useMemo(() => {
        if (mode !== 'header' || invoices.length === 0) return null;
        return invoices.reduce((acc, inv) => ({
          salesTotal: acc.salesTotal + (toNumber(inv.salesTotal) || 0),
          taxTotal: acc.taxTotal + (toNumber(inv.taxAmount) || 0),
          grandTotal: acc.grandTotal + (toNumber(inv.grandTotal) || 0)
        }), { salesTotal: 0, taxTotal: 0, grandTotal: 0 });
      }, [invoices, mode]);

      useEffect(() => {
        if (window.pdfjsLib) {
          setIsPdfReady(true);
          return;
        }
        const script = document.createElement('script');
        script.src = PDFJS_CDN;
        script.async = true;
        script.onload = () => {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_CDN;
          setIsPdfReady(true);
        };
        document.body.appendChild(script);
      }, []);

      useEffect(() => {
        if (files.length > 0 && isPdfReady) reparseFiles();
      }, [files, isPdfReady, mode]);

      const reparseFiles = async () => {
        const newItems = [];
        for (const file of files) {
          try {
            const results = await extractDataFromPdf(file, mode);
            const rows = results.map((res, idx) => ({
              id: `${file.name}-${idx}-${Math.random()}`,
              fileName: file.name,
              status: res.status || 'success',
              ...res
            }));
            newItems.push(...rows);
          } catch (e) { console.error(e); }
        }
        setInvoices(newItems);
      };

      const handleFiles = (fileList) => {
        if (!fileList) return;
        setFiles(prev => [...prev, ...Array.from(fileList)]);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        if (isPdfReady) handleFiles(e.dataTransfer.files);
      };

      const handleClear = () => { setInvoices([]); setFiles([]); };

      const handleExportCsv = () => {
        let headers;
        let rowMapper;
        if (mode === 'header') {
            headers = ['檔案', '發票號碼', '格式', '開立日期', '銷售額', '應稅', '零稅率', '免稅', '稅額(金額)', '總計', '統一編號', '賣方名稱'];
            rowMapper = (inv) => [
                inv.fileName, inv.invoiceNumber, inv.format, inv.date, 
                inv.salesTotal, inv.taxTypeTaxable, inv.taxTypeZero, inv.taxTypeExempt, 
                inv.taxAmount, inv.grandTotal, inv.sellerId, inv.sellerName
            ].map(s => `"${(s || '').replace(/"/g, '""')}"`);
        } else {
            headers = ['檔案', '發票號碼', '日期', '品名', '數量', '單價', '金額', '備註'];
            rowMapper = (inv) => [
                inv.fileName, inv.invoiceNumber, inv.date, 
                inv.description, inv.quantity, inv.unitPrice, inv.amount, inv.remarks
            ].map(s => `"${(s || '').replace(/"/g, '""')}"`);
        }
        const csvContent = [headers.join(','), ...invoices.map(inv => rowMapper(inv).join(','))].join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `invoices_${mode}_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 p-8 font-sans">
          <div className="max-w-7xl mx-auto space-y-6">
            
            <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
              <div className="flex flex-col gap-1">
                <h1 className="text-3xl font-bold text-gray-900 flex items-center gap-3 flex-wrap">
                  <FileText className="w-8 h-8 text-blue-600" />
                  電子發票解析器 (雙模式)
                  <div className="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200/60 rounded-lg text-base font-bold tracking-wide shadow-sm">
                    <ShieldCheck className="w-4 h-4 text-emerald-600" />
                    1.6.1 (定版)
                  </div>
                </h1>
                <p className="text-gray-500">支援「主檔模式」與「明細模式」切換</p>
              </div>
              
              <div className="flex bg-white p-1 rounded-xl border border-gray-300 shadow-sm">
                 <button
                    onClick={() => setMode('header')}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${mode === 'header' ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:bg-gray-100'}`}
                 >
                    <FileSpreadsheet className="w-4 h-4" />
                    模式 1：發票主檔
                 </button>
                 <button
                    onClick={() => setMode('details')}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${mode === 'details' ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:bg-gray-100'}`}
                 >
                    <List className="w-4 h-4" />
                    模式 2：明細列表
                 </button>
              </div>
            </header>

            {mode === 'header' && stats && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 animate-in fade-in slide-in-from-top-4 duration-500">
                <StatsCard 
                  title="總銷售金額 (未稅)" 
                  value={stats.salesTotal} 
                  icon={TrendingUp} 
                  colorClass="text-blue-600"
                  iconBgClass="bg-blue-50"
                />
                <StatsCard 
                  title="估算總稅額" 
                  value={stats.taxTotal} 
                  icon={PieChart} 
                  colorClass="text-amber-600"
                  iconBgClass="bg-amber-50"
                />
                <StatsCard 
                  title="應付總計 (含稅)" 
                  value={stats.grandTotal} 
                  icon={ShieldCheck} 
                  colorClass="text-emerald-600"
                  iconBgClass="bg-emerald-50"
                />
              </div>
            )}

            {invoices.length === 0 && (
              <section 
                className={`border-2 border-dashed rounded-2xl p-20 text-center transition-all cursor-pointer group 
                  ${isDragging ? 'border-blue-500 bg-blue-50' : 'border-gray-300 bg-white hover:border-blue-400'}
                  ${!isPdfReady ? 'opacity-60 cursor-not-allowed' : ''}`}
                onDragOver={(e) => { e.preventDefault(); if(isPdfReady) setIsDragging(true); }}
                onDragLeave={() => setIsDragging(false)}
                onDrop={handleDrop}
                onClick={() => isPdfReady && document.getElementById('fileInput')?.click()}
              >
                <input type="file" id="fileInput" multiple accept=".pdf" className="hidden" disabled={!isPdfReady} onChange={(e) => handleFiles(e.target.files)} />
                <div className="flex flex-col items-center gap-4">
                  <div className={`p-5 rounded-full transition-colors ${isPdfReady ? 'bg-blue-50 group-hover:bg-blue-100' : 'bg-gray-100'}`}>
                    {isPdfReady ? <Upload className="w-12 h-12 text-blue-600" /> : <Loader2 className="w-12 h-12 text-gray-400 animate-spin" />}
                  </div>
                  <div>
                    <h3 className="text-2xl font-bold text-gray-900">{isPdfReady ? '拖曳或點擊上傳 PDF' : '初始化引擎中...'}</h3>
                    <p className="text-gray-500 mt-2">支援多檔案批次處理，資料僅在瀏覽器本地解析</p>
                  </div>
                </div>
              </section>
            )}

            {invoices.length > 0 && (
              <div className="space-y-4">
                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                    <div className="font-semibold text-gray-700 px-2 flex items-center gap-2">
                       {mode === 'header' ? '發票主檔列表' : '商品明細列表'} 
                       <span className="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-md text-xs font-bold">{invoices.length}</span>
                    </div>
                    <div className="flex gap-3">
                       <button onClick={handleExportCsv} className="flex items-center gap-2 px-4 py-2 text-sm bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                          <Download className="w-4 h-4" /> 匯出 CSV
                       </button>
                       <button onClick={handleClear} className="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors font-medium">
                          <Trash2 className="w-4 h-4" /> 清空全部
                       </button>
                    </div>
                </div>

                {mode === 'header' && (
                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm text-left whitespace-nowrap">
                        <thead className="bg-gray-50 border-b text-gray-600 font-bold">
                          <tr>
                            <th className="px-6 py-4">發票號碼 / 檔名</th>
                            <th className="px-6 py-4">日期</th>
                            <th className="px-6 py-4 text-center">格式</th>
                            <th className="px-6 py-4 text-right">銷售額</th>
                            <th className="px-6 py-4 text-center">稅別</th>
                            <th className="px-6 py-4 text-right">稅額(金額)</th>
                            <th className="px-6 py-4 text-right">總計</th>
                            <th className="px-6 py-4">統一編號</th>
                            <th className="px-6 py-4">賣方名稱</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {invoices.map((inv) => (
                            <tr key={inv.id} className="hover:bg-gray-50/80 transition-colors">
                              <td className="px-6 py-4">
                                <div className="font-mono font-bold text-blue-700 text-base">{inv.invoiceNumber || '-'}</div>
                                <div className="text-xs text-gray-400 mt-0.5 truncate max-w-[150px]">{inv.fileName}</div>
                              </td>
                              <td className="px-6 py-4 font-medium text-gray-600">{inv.date}</td>
                              <td className="px-6 py-4 text-center text-gray-500">{inv.format || '-'}</td>
                              <td className="px-6 py-4 text-right font-mono text-gray-700">{inv.salesTotal || '-'}</td>
                              <td className="px-6 py-4 text-center">
                                 <div className="flex gap-1 justify-center">
                                   {inv.taxTypeTaxable && <span className="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[10px] font-bold">應稅</span>}
                                   {inv.taxTypeZero && <span className="bg-green-100 text-green-700 px-1.5 py-0.5 rounded text-[10px] font-bold">零稅</span>}
                                   {inv.taxTypeExempt && <span className="bg-gray-100 text-gray-700 px-1.5 py-0.5 rounded text-[10px] font-bold">免稅</span>}
                                 </div>
                              </td>
                              <td className="px-6 py-4 text-right font-mono text-gray-700">{inv.taxAmount || '-'}</td>
                              <td className="px-6 py-4 text-right font-mono font-bold text-gray-900 text-base">{inv.grandTotal || '-'}</td>
                              <td className="px-6 py-4 font-mono text-gray-600">{inv.sellerId || '-'}</td>
                              <td className="px-6 py-4 text-gray-700 font-medium truncate max-w-[200px]" title={inv.sellerName}>{inv.sellerName || '-'}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {mode === 'details' && invoices.map((inv) => (
                  <div key={inv.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-all">
                     <div className="p-5 grid grid-cols-12 gap-6 items-start">
                        <div className="col-span-12 md:col-span-3 border-r border-gray-100 pr-4">
                           <div className="flex items-center gap-2 mb-1.5">
                              <span className="bg-blue-50 text-blue-700 text-[10px] px-1.5 py-0.5 rounded-md font-bold uppercase tracking-wider">Page {inv.pageNumber}</span>
                              <span className="font-bold text-gray-900 font-mono">{inv.invoiceNumber || '無號碼'}</span>
                           </div>
                           <div className="text-xs text-gray-400 truncate font-medium" title={inv.fileName}>{inv.fileName}</div>
                           <div className="text-sm text-gray-500 mt-2 font-medium">{inv.date}</div>
                           {inv.status === 'warning' && (
                              <div className="text-[10px] bg-amber-50 text-amber-700 px-2 py-1 rounded-md mt-3 flex items-center gap-1 font-bold">
                                 <AlertCircle className="w-3 h-3" /> {inv.errorMessage}
                              </div>
                           )}
                        </div>

                        <div className="col-span-12 md:col-span-9 grid grid-cols-10 gap-3 text-sm">
                            <div className="col-span-10 md:col-span-4">
                               <div className="text-[10px] text-gray-400 font-bold uppercase mb-1 tracking-tight">品名說明</div>
                               <div className="whitespace-pre-wrap font-sans font-medium text-gray-800 leading-relaxed">
                                 {inv.description || <span className="text-gray-300 italic">無明細內容</span>}
                               </div>
                            </div>
                            <div className="col-span-5 md:col-span-1 text-right">
                               <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">數量</div>
                               <div className="font-mono font-bold text-gray-700">{inv.quantity || '-'}</div>
                            </div>
                            <div className="col-span-5 md:col-span-1 text-right">
                               <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">單價</div>
                               <div className="font-mono text-gray-700">{inv.unitPrice || '-'}</div>
                            </div>
                            <div className="col-span-5 md:col-span-2 text-right">
                               <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">金額</div>
                               <div className="font-mono font-black text-blue-800 text-base">{inv.amount || '-'}</div>
                            </div>
                            <div className="col-span-5 md:col-span-2 pl-4 md:border-l border-gray-100">
                               <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">備註</div>
                               <div className="text-xs text-gray-500 leading-snug italic break-all">{inv.remarks || '-'}</div>
                            </div>
                        </div>
                     </div>
                     <div className="px-5 pb-4">
                        <Inspector lines={inv.rawLineString || []} />
                     </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />); 
  </script>
</body>
</html>
