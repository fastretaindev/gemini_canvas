<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子發票解析器 Pro - 1.6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- 1. Configuration & Constants ---
        const PDFJS_WORKER_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_CDN;

        // --- 2. Utils & Parser Service (移植自您的 TEST2 原始碼) ---
        const ParserService = {
            toNumber(v) {
                if (!v) return null;
                if (typeof v === 'number') return v;
                let s = v.trim().replace(/[$,]/g, "");
                if ((s.match(/\./g) || []).length > 1) s = s.replace(/\.(?=.*\.)/g, "");
                const n = Number(s);
                return Number.isFinite(n) ? n : null;
            },
            groupTextItemsToLines(items) {
                const linesMap = new Map();
                const lineTolerance = 4;
                for (const item of items) {
                    const y = item.transform[5];
                    const x = item.transform[4];
                    let key = [...linesMap.keys()].find(k => Math.abs(k - y) <= lineTolerance);
                    if (key === undefined) key = y;
                    const arr = linesMap.get(key) || [];
                    arr.push({ x, text: item.str || "" });
                    linesMap.set(key, arr);
                }
                return Array.from(linesMap.entries())
                    .sort((a, b) => b[0] - a[0])
                    .map(([_, arr]) => arr.sort((a, b) => a.x - b.x).map(t => t.text).join(" "));
            },
            pickAmount(text, labelPattern) {
                const re = new RegExp(`${labelPattern}\\D*?([\\d,.]+)`);
                const m = text.match(re)?.[1] ?? null;
                return m ? this.toNumber(m) : null;
            },
            pickSellerBlock(text) {
                const m = text.match(/(?:營\s*業\s*人|賣\s*方)\s*[:：][\s\S]{0,300}/);
                return m?.[0] ?? "";
            },
            pickTaxType(text) {
                const taxBlock = text.match(/營\s*業\s*稅[\s\S]{0,150}/)?.[0] ?? text;
                let taxable = "", zero = "", exempt = "";
                if (/應\s*稅\s*[:：]?\s*[VvXx✓√]/.test(taxBlock)) taxable = "V";
                if (/零\s*稅\s*率\s*[:：]?\s*[VvXx✓√]/.test(taxBlock)) zero = "V";
                if (/免\s*稅\s*[:：]?\s*[VvXx✓√]/.test(taxBlock)) exempt = "V";
                if (!taxable && !zero && !exempt && /應\s*稅/.test(text) && !/零\s*稅/.test(text) && !/免\s*稅/.test(text)) taxable = "V";
                return taxable ? "V" : (zero ? "Zero" : (exempt ? "Exempt" : "")); 
            },
            parseInvoiceHeader(lines) {
                const fullText = lines.join("\n");
                const mInv = fullText.match(/(?:發\s*票\s*號\s*碼|號\s*碼)[：:.]?\s*([A-Z]{2}[- ]?\d{8})/);
                const sellerBlock = this.pickSellerBlock(fullText);
                const taxStatus = this.pickTaxType(fullText);
                return {
                    invoiceNumber: mInv ? mInv[1].replace(/[- ]/g, '') : "",
                    format: (fullText.match(/(?:格\s*式)[：:.]?\s*(\d{2})/) || [])[1] || "",
                    date: (fullText.match(/(\d{4}[-/]\d{2}[-/]\d{2})/) || [])[1] || "",
                    salesTotal: this.pickAmount(fullText, "銷\\s*售\\s*額\\s*合\\s*計"),
                    taxAmount: this.pickAmount(fullText, "(?:營\\s*業\\s*稅\\s*額|營\\s*業\\s*稅|稅\\s*額)"),
                    grandTotal: this.pickAmount(fullText, "總\\s*計"),
                    sellerId: (sellerBlock.match(/統\s*一\s*編\s*號\s*[:：.]?\s*(\d{8})/) || [])[1] || "",
                    sellerName: (sellerBlock.match(/[:：]\s*([^\n]+)/) || [])[1]?.trim() || "",
                    taxTypeTaxable: taxStatus === "V" ? "V" : "",
                    taxTypeZero: taxStatus === "Zero" ? "V" : "",
                    taxTypeExempt: taxStatus === "Exempt" ? "V" : ""
                };
            },
            parseItemRow(line) {
                const normalized = line.replace(/\s+/g, " ").trim();
                const regexp = /^(.+)\s+([-]?[\d,.]+)\s+([-]?[$]?[\d,.]+)\s+([-]?[$]?[\d,.]+)(?:\s+(.*))?$/;
                const m = normalized.match(regexp);
                if (!m) return null;
                return {
                    description: m[1].replace(/([\u4e00-\u9fa5])\s+([\u4e00-\u9fa5])/g, '$1$2').trim(),
                    quantity: m[2],
                    unitPrice: m[3].replace(/[$,]/g, ""), 
                    amount: m[4].replace(/[$,]/g, ""), 
                    remarks: m[5] ? m[5].trim() : ""
                };
            },
            parseInvoiceDetails(lines, invoiceNumberVal, dateVal) {
                const results = [];
                let startIndex = -1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes("品") && (lines[i].includes("數") || lines[i].includes("額"))) {
                        startIndex = i + 1;
                        break;
                    }
                }
                if (startIndex !== -1) {
                    for (let i = startIndex; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line || line.match(/(總\s*計|合\s*計|銷\s*售\s*額|營\s*業\s*稅|賣\s*方|統\s*一\s*編\s*號)/)) break;
                        const row = this.parseItemRow(line);
                        if (row && !isNaN(Number(row.amount))) {
                            results.push({ invoiceNumber: invoiceNumberVal, date: dateVal, ...row });
                        }
                    }
                }
                return results;
            }
        };

        // --- 3. Sub-Components ---
        const Icon = ({ name, className }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({ targets: containerRef.current });
                    const svg = containerRef.current.querySelector('svg');
                    if (svg && className) svg.setAttribute('class', className);
                }
            }, [name, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        const Inspector = ({ lines }) => {
            const [isOpen, setIsOpen] = useState(false);
            if (!lines || lines.length === 0) return null;
            return (
                <div className="mt-2 border-t border-gray-100 pt-2">
                    <button onClick={() => setIsOpen(!isOpen)} className="flex items-center gap-1 text-xs text-blue-600 font-bold">
                        <Icon name={isOpen ? "chevron-up" : "chevron-down"} className="w-3 h-3" />
                        {isOpen ? '隱藏原始資料' : '檢視原始資料'}
                    </button>
                    {isOpen && (
                        <div className="mt-2 p-3 bg-gray-800 text-green-400 font-mono text-[10px] rounded overflow-x-auto max-h-40 leading-relaxed">
                            {lines.map((l, i) => <div key={i} className="whitespace-nowrap"><span className="opacity-40 mr-2">{i}:</span>{l}</div>)}
                        </div>
                    )}
                </div>
            );
        };

        const StatsCard = ({ title, value, icon, colorClass, bgClass }) => (
            <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex items-center gap-4 transition-all hover:shadow-md">
                <div className={`p-4 rounded-2xl ${bgClass}`}>
                    <Icon name={icon} className={`w-6 h-6 ${colorClass}`} />
                </div>
                <div>
                    <p className="text-sm font-bold text-gray-400 mb-1">{title}</p>
                    <h3 className="text-2xl font-black text-slate-800">${(value || 0).toLocaleString()}</h3>
                </div>
            </div>
        );

        // --- 4. Main App Component ---
        function App() {
            const [invoices, setInvoices] = useState([]);
            const [mode, setMode] = useState('header');
            const [isLoading, setIsLoading] = useState(false);
            const [isPdfReady, setIsPdfReady] = useState(false);

            useEffect(() => {
                if (window.pdfjsLib) setIsPdfReady(true);
            }, []);

            const stats = useMemo(() => {
                if (mode !== 'header') return null;
                return invoices.reduce((acc, inv) => ({
                    salesTotal: acc.salesTotal + (ParserService.toNumber(inv.salesTotal) || 0),
                    taxTotal: acc.taxTotal + (ParserService.toNumber(inv.taxAmount) || 0),
                    grandTotal: acc.grandTotal + (ParserService.toNumber(inv.grandTotal) || 0)
                }), { salesTotal: 0, taxTotal: 0, grandTotal: 0 });
            }, [invoices, mode]);

            const processFiles = async (fileList) => {
                setIsLoading(true);
                const allResults = [];
                for (const file of fileList) {
                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        for (let p = 1; p <= pdf.numPages; p++) {
                            const page = await pdf.getPage(p);
                            const textContent = await page.getTextContent();
                            const lines = ParserService.groupTextItemsToLines(textContent.items);
                            const header = ParserService.parseInvoiceHeader(lines);

                            if (mode === 'header') {
                                if (header.invoiceNumber || header.grandTotal) {
                                    allResults.push({ ...header, id: `${file.name}-${p}-${Math.random()}`, fileName: file.name, pageNumber: p, rawLines: lines });
                                }
                            } else {
                                const details = ParserService.parseInvoiceDetails(lines, header.invoiceNumber, header.date);
                                if (details.length > 0) {
                                    details.forEach((d, idx) => allResults.push({ ...d, id: `${file.name}-${p}-${idx}`, fileName: file.name, pageNumber: p, rawLines: lines }));
                                } else if (header.invoiceNumber) {
                                    allResults.push({ id: Math.random(), invoiceNumber: header.invoiceNumber, date: header.date, fileName: file.name, description: "", status: 'warning', errorMessage: '未偵測到明細', pageNumber: p, rawLines: lines });
                                }
                            }
                        }
                    } catch (e) { console.error("PDF 解析失敗:", e); }
                }
                setInvoices(prev => [...prev, ...allResults]);
                setIsLoading(false);
            };

            const handleExport = () => {
                let headers, mapper;
                if (mode === 'header') {
                    headers = ['檔案', '發票號碼', '日期', '銷售額', '稅額', '總計', '統編', '賣方'];
                    mapper = (inv) => [inv.fileName, inv.invoiceNumber, inv.date, inv.salesTotal, inv.taxAmount, inv.grandTotal, inv.sellerId, inv.sellerName];
                } else {
                    headers = ['檔案', '發票', '品名', '數量', '單價', '金額', '備註'];
                    mapper = (inv) => [inv.fileName, inv.invoiceNumber, inv.description, inv.quantity, inv.unitPrice, inv.amount, inv.remarks];
                }
                const csv = [headers.join(','), ...invoices.map(inv => mapper(inv).map(v => `"${(v || '').toString().replace(/"/g, '""')}"`).join(','))].join('\n');
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                window.open(URL.createObjectURL(blob));
            };

            return (
                <div className="max-w-7xl mx-auto p-8 space-y-6">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                        <div className="flex flex-col gap-1">
                            <h1 className="text-3xl font-black text-gray-900 flex items-center gap-3">
                                <Icon name="file-text" className="text-blue-600 w-8 h-8" />
                                電子發票解析器
                                <div className="flex items-center gap-1 px-2 py-1 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg text-sm font-bold shadow-sm">
                                    <Icon name="shield-check" className="w-4 h-4" /> 1.6.1 定版
                                </div>
                            </h1>
                            <p className="text-gray-500 font-medium">支援「主檔模式」與「商品明細」雙解析引擎</p>
                        </div>
                        <div className="flex bg-white p-1 rounded-xl border border-gray-200 shadow-sm">
                            <button onClick={() => {setMode('header'); setInvoices([]);}} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'header' ? 'bg-blue-600 text-white shadow' : 'text-gray-500 hover:bg-gray-100'}`}>模式 1：發票主檔</button>
                            <button onClick={() => {setMode('details'); setInvoices([]);}} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'details' ? 'bg-blue-600 text-white shadow' : 'text-gray-500 hover:bg-gray-100'}`}>模式 2：明細列表</button>
                        </div>
                    </header>

                    {mode === 'header' && stats && invoices.length > 0 && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in slide-in-from-top-4 duration-500">
                            <StatsCard title="總銷售額 (未稅)" value={stats.salesTotal} icon="trending-up" colorClass="text-blue-600" bgClass="bg-blue-50" />
                            <StatsCard title="估算總稅額" value={stats.taxTotal} icon="pie-chart" colorClass="text-amber-600" bgClass="bg-amber-50" />
                            <StatsCard title="應付總計 (含稅)" value={stats.grandTotal} icon="shield-check" colorClass="text-emerald-600" bgClass="bg-emerald-50" />
                        </div>
                    )}

                    <main>
                        {invoices.length === 0 ? (
                            <section 
                                onClick={() => !isLoading && document.getElementById('fileInput').click()}
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={(e) => { e.preventDefault(); processFiles(e.dataTransfer.files); }}
                                className={`border-4 border-dashed rounded-3xl p-20 text-center transition-all cursor-pointer group ${isLoading ? 'opacity-50' : 'border-gray-200 bg-white hover:border-blue-400 hover:bg-blue-50'}`}
                            >
                                <input type="file" id="fileInput" multiple accept=".pdf" className="hidden" onChange={(e) => processFiles(e.target.files)} />
                                <div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                                    {isLoading ? <Icon name="loader-2" className="w-10 h-10 text-blue-600 animate-spin" /> : <Icon name="upload-cloud" className="w-10 h-10 text-blue-600" />}
                                </div>
                                <h2 className="text-2xl font-black text-gray-800">{isLoading ? '正在處理數據...' : '拖曳或點擊上傳 PDF'}</h2>
                                <p className="text-gray-400 mt-2 font-medium">支援多檔案批次處理，資料僅在本地解析</p>
                            </section>
                        ) : (
                            <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                    <div className="font-bold text-gray-700 px-2 flex items-center gap-2">
                                        <Icon name="list" className="w-4 h-4 text-blue-600" />
                                        {mode === 'header' ? '發票主檔列表' : '商品明細列表'}
                                        <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-xs">{invoices.length}</span>
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={handleExport} className="flex items-center gap-2 px-4 py-2 text-sm bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-bold transition-all shadow-sm">
                                            <Icon name="download" className="w-4 h-4" /> 匯出 CSV
                                        </button>
                                        <button onClick={() => setInvoices([])} className="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-bold rounded-lg transition-all">
                                            <Icon name="trash-2" className="w-4 h-4" /> 清空全部
                                        </button>
                                    </div>
                                </div>

                                {mode === 'header' ? (
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left whitespace-nowrap text-sm">
                                                <thead className="bg-gray-50/80 border-b text-gray-400 font-black uppercase tracking-widest text-[10px]">
                                                    <tr>
                                                        <th className="px-6 py-4">發票號碼 / 檔案</th>
                                                        <th className="px-6 py-4">開立日期</th>
                                                        <th className="px-6 py-4 text-center">格式</th>
                                                        <th className="px-6 py-4 text-right">銷售額</th>
                                                        <th className="px-6 py-4 text-center">稅別</th>
                                                        <th className="px-6 py-4 text-right">稅額</th>
                                                        <th className="px-6 py-4 text-right">總計</th>
                                                        <th className="px-6 py-4">賣方資訊</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {invoices.map(inv => (
                                                        <tr key={inv.id} className="hover:bg-blue-50/30 transition-colors">
                                                            <td className="px-6 py-4">
                                                                <div className="font-mono font-bold text-blue-700 text-base">{inv.invoiceNumber || '---'}</div>
                                                                <div className="text-[10px] text-gray-400 mt-0.5 truncate max-w-[120px]">{inv.fileName}</div>
                                                            </td>
                                                            <td className="px-6 py-4 font-bold text-gray-600">{inv.date}</td>
                                                            <td className="px-6 py-4 text-center text-gray-400">{inv.format}</td>
                                                            <td className="px-6 py-4 text-right font-mono text-gray-700">{inv.salesTotal?.toLocaleString() || '-'}</td>
                                                            <td className="px-6 py-4 text-center">
                                                                <div className="flex gap-1 justify-center">
                                                                    {inv.taxTypeTaxable && <span className="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[10px] font-bold">應稅</span>}
                                                                    {inv.taxTypeZero && <span className="bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded text-[10px] font-bold">零稅</span>}
                                                                    {inv.taxTypeExempt && <span className="bg-gray-100 text-gray-700 px-1.5 py-0.5 rounded text-[10px] font-bold">免稅</span>}
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 text-right font-mono text-gray-700">{inv.taxAmount?.toLocaleString() || '-'}</td>
                                                            <td className="px-6 py-4 text-right font-mono font-black text-gray-900 text-base">{inv.grandTotal?.toLocaleString() || '-'}</td>
                                                            <td className="px-6 py-4">
                                                                <div className="text-sm font-bold text-gray-700">{inv.sellerId}</div>
                                                                <div className="text-[10px] text-gray-400 truncate max-w-[150px]">{inv.sellerName}</div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid gap-4">
                                        {invoices.map(inv => (
                                            <div key={inv.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-all">
                                                <div className="p-6 grid grid-cols-12 gap-6 items-start">
                                                    <div className="col-span-12 md:col-span-3 border-r border-gray-100 pr-4">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <span className="bg-blue-50 text-blue-700 text-[10px] px-2 py-0.5 rounded-lg font-bold">PAGE {inv.pageNumber}</span>
                                                            <span className="font-black text-gray-900 font-mono tracking-tight">{inv.invoiceNumber}</span>
                                                        </div>
                                                        <div className="text-[10px] text-gray-400 truncate font-medium">{inv.fileName}</div>
                                                        <div className="text-sm text-gray-500 mt-2 font-bold">{inv.date}</div>
                                                        {inv.status === 'warning' && (
                                                            <div className="text-[10px] bg-amber-50 text-amber-700 px-2 py-1 rounded-lg mt-3 flex items-center gap-1 font-bold">
                                                                <Icon name="alert-triangle" className="w-3 h-3" /> {inv.errorMessage}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="col-span-12 md:col-span-9 grid grid-cols-10 gap-4 text-sm">
                                                        <div className="col-span-10 md:col-span-4">
                                                            <div className="text-[10px] text-gray-400 font-black uppercase mb-1 tracking-widest">品名說明</div>
                                                            <div className="font-bold text-gray-800 leading-relaxed">
                                                                {inv.description || <span className="text-gray-300 italic">無明細內容</span>}
                                                            </div>
                                                        </div>
                                                        <div className="col-span-3 md:col-span-1 text-right">
                                                            <div className="text-[10px] text-gray-400 font-black uppercase mb-1">數量</div>
                                                            <div className="font-mono font-bold">{inv.quantity}</div>
                                                        </div>
                                                        <div className="col-span-3 md:col-span-1 text-right">
                                                            <div className="text-[10px] text-gray-400 font-black uppercase mb-1">單價</div>
                                                            <div className="font-mono text-gray-600">{inv.unitPrice}</div>
                                                        </div>
                                                        <div className="col-span-4 md:col-span-2 text-right">
                                                            <div className="text-[10px] text-gray-400 font-black uppercase mb-1">金額</div>
                                                            <div className="font-mono font-black text-blue-700 text-lg">${inv.amount}</div>
                                                        </div>
                                                        <div className="col-span-10 md:col-span-2 pl-4 md:border-l border-gray-100">
                                                            <div className="text-[10px] text-gray-400 font-black uppercase mb-1">備註</div>
                                                            <div className="text-xs text-gray-500 italic break-all">{inv.remarks || '-'}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="px-6 pb-4 bg-gray-50/50">
                                                    <Inspector lines={inv.rawLines} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="text-center py-12 border-t border-gray-200 mt-12 opacity-50">
                        <div className="flex flex-wrap justify-center items-center gap-8 text-gray-400 text-xs font-black tracking-widest uppercase">
                            <span className="flex items-center gap-2"><Icon name="shield-check" className="w-4 h-4" /> Local Processing</span>
