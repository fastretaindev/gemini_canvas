<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能量拉霸抽獎機系統 - v3.2.0</title>
    <!-- 載入外部資源：Tailwind, React, Babel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
    </style>
</head>
<body class="m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // 自定義內置 SVG 組件 (解決外部圖標庫載入失敗的問題)
        const Volume2 = ({ size = 16 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
        );

        const VolumeX = ({ size = 16 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="22" y1="9" x2="16" y2="15"></line>
                <line x1="16" y1="9" x2="22" y2="15"></line>
            </svg>
        );

        // 與 v3.2.0 完全同步的配置與圖片連結
        const CONFIG = {
          VERSION: 'v3.2.0',
          SHEET_ID: '1265_9nKs6BdgIfobRvJPmABJWQkrj212Tpr6eJVM1I8',
          HEADER_KEYWORDS: ["姓名", "name", "名單", "id", "編號", "部門", "職稱", "department", "title"],
          DEFAULT_DATA: [{ a: "結果", b: "部門", c: "職稱", d: "姓名" }],
          INITIAL_IMAGE: 'https://fastretaindev.github.io/gemini_canvas/images/tryall%20logo.png',
          LEVER_SOUND_URL: 'https://fastretaindev.github.io/gemini_canvas/images/mixkit-game-blood-pop-slide-2363.wav',
          SPIN_SOUND_URL: 'https://fastretaindev.github.io/gemini_canvas/images/slot-machine2.wav',
          WINNER_SOUND_URL: 'https://fastretaindev.github.io/gemini_canvas/images/mixkit-successful-horns-fanfare-722.wav',
          MACHINE_LOGO: 'https://fastretaindev.github.io/gemini_canvas/images/logo4.png',
          BACKGROUND_IMAGE: 'https://fastretaindev.github.io/gemini_canvas/images/JY.png'
        };

        const getSecureRandomInt = (max) => {
          if (max <= 0) return 0;
          const array = new Uint32Array(1);
          window.crypto.getRandomValues(array);
          return array[0] % max;
        };

        const shuffleArray = (array) => {
          const newArr = [...array];
          for (let i = newArr.length - 1; i > 0; i--) {
            const j = getSecureRandomInt(i + 1);
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
          }
          return newArr;
        };

        function App() {
          const [originalList, setOriginalList] = useState([]); 
          const [employees, setEmployees] = useState([]);     
          const [isSpinning, setIsSpinning] = useState(false);
          const [isPulling, setIsPulling] = useState(false); 
          const [isMuted, setIsMuted] = useState(false); 
          const [statusText, setStatusText] = useState("SYSTEM READY");
          const [showNextBtn, setShowNextBtn] = useState(false);
          const [winnerObj, setWinnerObj] = useState(null);

          const stripRefs = [useRef(null), useRef(null), useRef(null)];
          const leverAudioRef = useRef(null);
          const spinAudioRef = useRef(null);
          const winnerAudioRef = useRef(null);

          useEffect(() => {
            leverAudioRef.current = new Audio(CONFIG.LEVER_SOUND_URL);
            spinAudioRef.current = new Audio(CONFIG.SPIN_SOUND_URL);
            spinAudioRef.current.loop = true;
            winnerAudioRef.current = new Audio(CONFIG.WINNER_SOUND_URL);
            return () => {
              [leverAudioRef, spinAudioRef, winnerAudioRef].forEach(ref => {
                if (ref.current) ref.current.pause();
              });
            };
          }, []);

          useEffect(() => {
            [leverAudioRef, spinAudioRef, winnerAudioRef].forEach(ref => {
              if (ref.current) ref.current.muted = isMuted;
            });
          }, [isMuted]);

          const getItemHeight = () => window.innerWidth >= 768 ? 140 : 100;

          const buildStrip = useCallback((stripEl, target, itemCount, colKey, isInitial = false) => {
            if (!stripEl) return;
            stripEl.innerHTML = '';
            const itemHeight = getItemHeight();
            const itemClass = "w-full flex items-center justify-center border-b border-slate-100 box-border px-2 leading-tight bg-white";
            const textClass = "text-[1.2rem] md:text-[1.8rem] font-black text-[#1e293b] text-center";
            const setStyle = (el) => { el.style.height = `${itemHeight}px`; };

            if (isInitial) {
              const item = document.createElement('div');
              item.className = itemClass;
              setStyle(item);
              const img = document.createElement('img');
              img.src = CONFIG.INITIAL_IMAGE;
              img.className = "h-4/5 w-4/5 object-contain";
              item.appendChild(img);
              stripEl.appendChild(item);
            } else {
              for (let i = 0; i < itemCount - 1; i++) {
                const list = originalList.length > 0 ? originalList : CONFIG.DEFAULT_DATA;
                const randomEntry = list[getSecureRandomInt(list.length)];
                const item = document.createElement('div');
                item.className = itemClass + " " + textClass;
                item.innerText = randomEntry[colKey] || "-";
                setStyle(item);
                stripEl.appendChild(item);
              }
              const winnerItem = document.createElement('div');
              winnerItem.className = itemClass + " " + textClass + " text-[#059669]"; 
              winnerItem.innerText = target;
              setStyle(winnerItem);
              stripEl.appendChild(winnerItem);
            }
            stripEl.style.transition = 'none';
            stripEl.style.transform = `translateY(0px)`;
          }, [originalList]);

          const loadNames = useCallback(async () => {
            setStatusText("CONNECTING...");
            const sheetUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json`;
            try {
              const response = await fetch(sheetUrl);
              const text = await response.text();
              const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/);
              if (!match) throw new Error("Fetch Error");
              const data = JSON.parse(match[1]);
              let rows = data.table.rows;
              if (!rows || rows.length === 0) throw new Error("No Data");
              const isHeader = rows[0].c?.some(cell => {
                const val = cell?.v?.toString().toLowerCase() || "";
                return CONFIG.HEADER_KEYWORDS.some(k => val.includes(k.toLowerCase()));
              });
              if (isHeader) rows = rows.slice(1);
              const fetchedData = rows.map(row => ({
                a: row.c[0]?.v?.toString().trim() || "",
                b: row.c[1]?.v?.toString().trim() || "",
                c: row.c[2]?.v?.toString().trim() || "",
                d: row.c[3]?.v?.toString().trim() || ""
              })).filter(item => item && (item.a || item.b || item.c || item.d));
              if (fetchedData.length > 0) {
                setOriginalList(fetchedData);
                setEmployees(fetchedData);
                setStatusText("READY");
              }
            } catch (error) {
              setOriginalList(CONFIG.DEFAULT_DATA);
              setEmployees(CONFIG.DEFAULT_DATA);
              setStatusText("OFFLINE MODE");
            }
          }, []);

          useEffect(() => { loadNames(); }, [loadNames]);
          useEffect(() => {
            if (originalList.length >= 0) {
              stripRefs.forEach(ref => buildStrip(ref.current, null, 1, "", true));
            }
          }, [originalList, buildStrip]);

          const triggerSpin = () => {
            if (isSpinning || employees.length === 0) return;
            setIsPulling(true);
            if (leverAudioRef.current) {
              leverAudioRef.current.currentTime = 0;
              leverAudioRef.current.play().catch(() => {});
            }
            setTimeout(() => { spinMachine(); }, 400);
            setTimeout(() => { setIsPulling(false); }, 650);
          };

          const spinMachine = () => {
            setIsSpinning(true);
            setStatusText("SPINNING...");
            setWinnerObj(null);
            setShowNextBtn(false);
            if (spinAudioRef.current) {
              spinAudioRef.current.currentTime = 0;
              spinAudioRef.current.play().catch(() => {});
            }

            const shuffledPool = shuffleArray(employees);
            const winnerIndex = getSecureRandomInt(shuffledPool.length);
            const targetWinner = shuffledPool[winnerIndex];
            const newPool = employees.filter(emp => emp !== targetWinner);

            const itemHeight = getItemHeight();
            const config = [
              { items: 25, duration: 2.2, key: 'b' },
              { items: 35, duration: 3.0, key: 'c' },
              { items: 45, duration: 3.8, key: 'd' }
            ];

            stripRefs.forEach((ref, index) => {
              const strip = ref.current;
              const colKey = config[index].key;
              buildStrip(strip, targetWinner[colKey], config[index].items, colKey);
              void strip.offsetWidth; 
              strip.classList.add('blur-[2px]');
              strip.style.transition = `transform ${config[index].duration}s cubic-bezier(0.1, 0.9, 0.2, 1)`;
              const targetY = -((config[index].items - 1) * itemHeight);
              strip.style.transform = `translateY(${targetY}px)`;
              
              setTimeout(() => {
                strip.classList.remove('blur-[2px]');
                if (index === 2) {
                  setIsSpinning(false);
                  setWinnerObj(targetWinner);
                  setEmployees(newPool);
                  setStatusText("WINNER!");
                  if (spinAudioRef.current) spinAudioRef.current.pause();
                  if (winnerAudioRef.current) {
                    winnerAudioRef.current.currentTime = 0;
                    winnerAudioRef.current.play().catch(() => {});
                  }
                  triggerConfetti();
                  if (newPool.length > 0) setShowNextBtn(true);
                }
              }, config[index].duration * 1000);
            });
          };

          const triggerConfetti = () => {
            const colors = ['#ef4444', '#ffffff', '#fbbf24', '#3b82f6', '#059669', '#f472b6'];
            const originX = window.innerWidth / 2;
            const originY = window.innerHeight * 0.7;
            for(let i = 0; i < 150; i++) {
              const div = document.createElement('div');
              div.className = "fixed pointer-events-none z-[1000]";
              const size = Math.random() * 8 + 6;
              div.style.width = `${size}px`; div.style.height = `${size}px`;
              div.style.left = `${originX}px`; div.style.top = `${originY}px`;
              div.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
              div.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
              document.body.appendChild(div);
              const angle = (Math.random() * Math.PI * 2);
              const velocity = 15 + Math.random() * 25;
              const tx = Math.cos(angle) * velocity * 15;
              const ty = Math.sin(angle) * velocity * 15 + 300;
              const rot = 360 + Math.random() * 1080;
              div.animate([
                { transform: 'translate(0, 0) rotate(0deg) scale(0)', opacity: 1 },
                { offset: 0.2, transform: `translate(${tx * 0.2}px, ${ty * 0.2 - 150}px) rotate(${rot * 0.2}deg) scale(1)`, opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(0.5)`, opacity: 0 }
              ], { duration: 1500 + Math.random() * 1500, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => div.remove();
            }
          };

          return (
            <div className="min-h-screen w-full flex flex-col items-center justify-center py-4 px-4 bg-cover bg-center bg-fixed overflow-hidden transition-all duration-700" 
                 style={{ backgroundImage: `linear-gradient(to bottom, rgba(241, 245, 249, 0.1), rgba(15, 23, 42, 0.4)), url('${CONFIG.BACKGROUND_IMAGE}')` }}>
              
              <style>{`
                .special-text {
                  font-family: 'Noto Sans TC', sans-serif;
                  font-weight: 900; font-style: italic;
                  background: linear-gradient(180deg, #0f766e 0%, #1e293b 100%);
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                  filter: drop-shadow(2px 2px 0px white) drop-shadow(-2px -2px 0px white) drop-shadow(2px -2px 0px white) drop-shadow(-2px 2px 0px white) drop-shadow(0px 4px 12px rgba(0,0,0,0.2));
                  transform: skewX(-10deg); display: inline-block;
                }
                .winner-pulse { animation: pulse-green 1.2s infinite alternate; }
                @keyframes pulse-green {
                  0% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); border-color: #10b981; }
                  100% { box-shadow: 0 0 40px rgba(16, 185, 129, 1); border-color: #34d399; }
                }
                .lever-system { perspective: 1200px; }
                .lever-shaft-group {
                  transform-origin: center 90%; transition: transform 0.45s cubic-bezier(0.5, 0, 0.3, 1);
                  z-index: 50; display: flex; flex-col; items-center;
                }
                .lever-shaft-group.pulling { transform: rotateX(65deg); }
                .lever-arm {
                  position: relative; overflow: hidden;
                  background: linear-gradient(to right, #92400e 0%, #d97706 15%, #fef3c7 45%, #fbbf24 55%, #d97706 85%, #92400e 100%);
                }
                .lever-arm::after {
                  content: ''; position: absolute; top: 0; left: 45%; width: 10%; height: 100%;
                  background: rgba(255, 255, 255, 0.6); filter: blur(1px);
                }
                .lever-head {
                  position: relative; overflow: hidden; background: red;
                  box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 6px 6px 15px rgba(255,255,255,0.5), inset -6px -10px 15px rgba(0,0,0,0.5);
                }
                .lever-head::after {
                  content: ''; position: absolute; top: 15%; left: 15%; width: 35%; height: 35%;
                  background: rgba(255, 255, 255, 0.5); border-radius: 50%; filter: blur(2px);
                }
              `}</style>

              <div className="text-center mb-6 z-10 px-4">
                <h1 className="text-4xl md:text-6xl special-text tracking-tighter">追求卓越 挑戰極限</h1>
              </div>

              <div className="relative flex items-center justify-center max-w-full scale-95 md:scale-100 transition-transform">
                <div className="relative z-10 p-4 md:p-10 rounded-[40px] bg-gradient-to-br from-slate-100/90 via-slate-300/90 to-slate-400/90 border-4 border-slate-200/50 shadow-[0_30px_80px_rgba(0,0,0,0.3),inset_0_4px_10px_rgba(255,255,255,0.8)] backdrop-blur-sm">
                  <div className="flex justify-center mb-8">
                    <img src={CONFIG.MACHINE_LOGO} alt="Brand Logo" className="h-20 md:h-32 object-contain drop-shadow-[0_4px_20px_rgba(16,185,129,0.5)]" />
                  </div>
                  <div className="flex justify-center gap-3 md:gap-5 bg-slate-100/50 p-4 md:p-6 rounded-[24px] shadow-[inset_0_4px_25px_rgba(0,0,0,0.2)] relative border border-white/60">
                    {[0, 1, 2].map((i) => (
                      <div key={i} className={`w-[85px] md:w-[150px] h-[100px] md:h-[140px] bg-white rounded-xl overflow-hidden relative border-2 border-slate-200 shadow-inner ${winnerObj ? 'winner-pulse' : 'border-slate-300'}`}>
                        <div ref={stripRefs[i]} className="absolute top-0 left-0 w-full flex flex-col"></div>
                      </div>
                    ))}
                    <div className="absolute top-0 left-0 right-0 h-[40%] bg-gradient-to-b from-white/30 to-transparent rounded-t-[24px] pointer-events-none z-20" />
                  </div>
                  <div className="lever-system absolute -right-6 md:-right-8 top-1/2 -translate-y-1/2 flex flex-col items-center">
                    <div className={`lever-shaft-group flex flex-col items-center cursor-pointer group ${isPulling ? 'pulling' : ''} ${isSpinning ? 'pointer-events-none' : ''}`}
                      onClick={triggerSpin}>
                      <div className="lever-head w-10 md:w-16 h-10 md:h-16 rounded-full group-hover:scale-105 transition-transform" />
                      <div className="lever-arm w-3 md:w-4 h-24 md:h-40 border-x border-amber-900 shadow-[2px_0_10px_rgba(0,0,0,0.3)] -mt-1" />
                    </div>
                    <div className="w-10 md:w-12 h-10 md:h-12 bg-gradient-to-br from-slate-400 to-slate-600 rounded-full border-4 border-slate-300 shadow-2xl -mt-6 z-10" />
                  </div>
                </div>
              </div>

              <div className="w-full max-w-xs mt-6 bg-white/40 backdrop-blur-md p-4 rounded-[28px] border border-white/40 shadow-[0_15px_35px_rgba(0,0,0,0.15)] z-10 min-h-[100px] flex flex-col items-center justify-center relative overflow-hidden">
                <div className="w-full flex flex-col items-center justify-center mb-3 text-center relative z-10">
                  {winnerObj ? (
                    <div className="w-full animate-in fade-in zoom-in duration-500">
                      <span className="text-slate-600 text-[10px] tracking-[0.2em] uppercase mb-0.5 block font-black">WINNER</span>
                      <span className="text-[#059669] text-2xl md:text-3xl font-black drop-shadow(0 2px 10px rgba(5,150,105,0.3)) leading-tight w-full block">{winnerObj.a}</span>
                    </div>
                  ) : (
                    <span className="text-slate-500 font-black tracking-widest text-xs uppercase animate-pulse">{statusText}</span>
                  )}
                </div>
                <div className="w-full flex flex-col items-center justify-center gap-3 relative z-10">
                  {!showNextBtn ? (
                    <button onClick={triggerSpin} disabled={isSpinning || employees.length === 0} 
                            className="w-full max-w-[180px] py-2.5 bg-[#10b981] hover:bg-[#059669] text-white font-black text-lg md:text-xl rounded-xl transition-all transform active:scale-95 shadow-[0_6px_15px_rgba(16,185,129,0.3)] uppercase italic disabled:opacity-30">
                      Spin!
                    </button>
                  ) : (
                    <button onClick={() => { setWinnerObj(null); setShowNextBtn(false); setStatusText("READY"); }} 
                            className="w-full max-w-[140px] py-2.5 bg-slate-100/80 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-all shadow-md active:scale-95 text-base uppercase tracking-widest">
                      NEXT
                    </button>
                  )}
                </div>
                <button 
                  onClick={() => setIsMuted(!isMuted)} 
                  className="absolute bottom-3 right-3 text-slate-500 hover:text-slate-800 transition-colors p-1 z-20"
                  title={isMuted ? "Unmute" : "Mute"}
                >
                  {isMuted ? <VolumeX size={16} /> : <Volume2 size={16} />}
                </button>
              </div>

              <div className="mt-4 opacity-40 text-[9px] text-slate-500 font-mono tracking-widest select-none uppercase z-10">
                {CONFIG.VERSION} STABLE RELEASE
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
