<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>藍田庫存異動紀錄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const PAPA_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js';
    const XLSX_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';

    function SvgIcon(props = {}) {
      const { children, className = 'w-4 h-4', viewBox = '0 0 24 24' } = props;
      return (
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox={viewBox} stroke="currentColor" strokeWidth="2" className={className}>
          {children}
        </svg>
      );
    }

    const Upload = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M12 16V4m0 0-4 4m4-4 4 4M4 20h16" /></SvgIcon>;
    const FileSpreadsheet = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" /><path strokeLinecap="round" strokeLinejoin="round" d="M14 3v5h5M8 13h8M8 17h8M8 9h8M12 9v8" /></SvgIcon>;
    const Trash2 = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M3 6h18" /><path strokeLinecap="round" strokeLinejoin="round" d="M8 6V4h8v2" /><path strokeLinecap="round" strokeLinejoin="round" d="M19 6l-1 14H6L5 6" /><path strokeLinecap="round" strokeLinejoin="round" d="M10 11v6M14 11v6" /></SvgIcon>;
    const Download = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v12m0 0 4-4m-4 4-4-4M4 21h16" /></SvgIcon>;
    const Search = (props = {}) => <SvgIcon {...props}><circle cx="11" cy="11" r="7" /><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35" /></SvgIcon>;
    const AlertCircle = (props = {}) => <SvgIcon {...props}><circle cx="12" cy="12" r="10" /><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01" /></SvgIcon>;
    const CheckCircle2 = (props = {}) => <SvgIcon {...props}><circle cx="12" cy="12" r="10" /><path strokeLinecap="round" strokeLinejoin="round" d="m9 12 2 2 4-4" /></SvgIcon>;
    const ArrowRight = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h14" /><path strokeLinecap="round" strokeLinejoin="round" d="m13 5 7 7-7 7" /></SvgIcon>;
    const Loader2 = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M21 12a9 9 0 1 1-6.219-8.56" /></SvgIcon>;
    const Database = (props = {}) => <SvgIcon {...props}><ellipse cx="12" cy="5" rx="7" ry="3" /><path strokeLinecap="round" strokeLinejoin="round" d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5" /><path strokeLinecap="round" strokeLinejoin="round" d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6" /></SvgIcon>;
    const TableIcon = (props = {}) => <SvgIcon {...props}><rect x="3" y="4" width="18" height="16" rx="2" /><path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M9 4v16M15 4v16" /></SvgIcon>;
    const FileText = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" /><path strokeLinecap="round" strokeLinejoin="round" d="M14 3v5h5" /><path strokeLinecap="round" strokeLinejoin="round" d="M9 13h6M9 17h6M9 9h1" /></SvgIcon>;
    const ChevronDown = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="m6 9 6 6 6-6" /></SvgIcon>;
    const Settings2 = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v2" /><path strokeLinecap="round" strokeLinejoin="round" d="M12 19v2" /><path strokeLinecap="round" strokeLinejoin="round" d="m4.93 4.93 1.41 1.41" /><path strokeLinecap="round" strokeLinejoin="round" d="m17.66 17.66 1.41 1.41" /><path strokeLinecap="round" strokeLinejoin="round" d="M3 12h2" /><path strokeLinecap="round" strokeLinejoin="round" d="M19 12h2" /><path strokeLinecap="round" strokeLinejoin="round" d="m4.93 19.07 1.41-1.41" /><path strokeLinecap="round" strokeLinejoin="round" d="m17.66 6.34 1.41-1.41" /><circle cx="12" cy="12" r="3" /></SvgIcon>;
    const Hash = (props = {}) => <SvgIcon {...props}><path strokeLinecap="round" strokeLinejoin="round" d="M5 9h14M4 15h14M10 3 8 21M16 3l-2 18" /></SvgIcon>;

    const Utils = {
      formatDate: (val) => {
        if (!val) return '';
        let date;
        if (typeof val === 'number') {
          date = new Date(Math.round((val - 25569) * 864e5));
        } else {
          const s = String(val).trim();
          if (!s) return '';
          date = new Date(s);
        }
        if (isNaN(date.getTime())) return String(val);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      },
      formatNumber: (val) => {
        if (typeof val === 'number') return val;
        const s = String(val || '0').replace(/[^0-9.-]/g, '').trim();
        const n = parseFloat(s);
        return isNaN(n) ? 0 : n;
      },
      formatDocId: (val) => {
        if (!val) return '';
        return String(val).replace(/\r?\n|\r/g, '|').trim();
      }
    };

    function Dropzone({ onFileSelect, loading, ready }) {
      const [isDragActive, setIsDragActive] = useState(false);

      return (
        <div
          className={`relative border-2 border-dashed rounded-[2rem] p-16 text-center transition-all duration-300 ${isDragActive ? 'border-indigo-500 bg-indigo-50/50' : 'border-slate-200 bg-white hover:border-indigo-400'} ${loading || !ready ? 'opacity-50 cursor-wait' : 'cursor-pointer'}`}
          onDragOver={(e) => { e.preventDefault(); if (ready) setIsDragActive(true); }}
          onDragLeave={() => setIsDragActive(false)}
          onDrop={(e) => { e.preventDefault(); setIsDragActive(false); const f = e.dataTransfer.files[0]; if (f && ready) onFileSelect(f); }}
          onClick={() => !loading && ready && document.getElementById('file-input')?.click()}
        >
          <input type="file" id="file-input" className="hidden" accept=".csv,.xlsx,.xls" onChange={(e) => { const f = e.target.files?.[0]; if (f) onFileSelect(f); }} />
          <div className="flex flex-col items-center gap-6">
            <div className={`p-6 rounded-3xl transition-all duration-500 ${loading ? 'animate-spin bg-slate-100' : 'bg-indigo-50 text-indigo-600 scale-110'}`}>
              {loading ? <Loader2 size={40} /> : <Upload size={40} />}
            </div>
            <div className="space-y-3">
              <h2 className="text-2xl font-black text-slate-800">{!ready ? '引擎載入中...' : loading ? '正在處理數據...' : '上傳報表檔案'}</h2>
              <div className="flex flex-col gap-1">
                <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">支援上傳：.xlsx, .xls, .csv 格式</p>
                <p className="text-indigo-400 font-bold text-[11px] uppercase tracking-widest">支援下載：Excel (.xlsx), CSV (含標題 / 純內容)</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DataView({ data, onClear }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [columnInput, setColumnInput] = useState('');
      const [isExportOpen, setIsExportOpen] = useState(false);
      const exportRef = useRef(null);

      const allAvailableColumns = useMemo(() => data.length === 0 ? [] : Object.keys(data[0]), [data]);

      const { visibleColumns, invalidColumns } = useMemo(() => {
        if (!columnInput.trim()) return { visibleColumns: allAvailableColumns, invalidColumns: [] };
        const inputCols = columnInput.split(/[,,\s]+/).filter(c => c.trim() !== '');
        const valid = [];
        const invalid = [];
        inputCols.forEach(colName => {
          if (allAvailableColumns.includes(colName)) valid.push(colName);
          else invalid.push(colName);
        });
        return { visibleColumns: valid.length > 0 ? valid : allAvailableColumns, invalidColumns: invalid };
      }, [columnInput, allAvailableColumns]);

      const [colWidths, setColWidths] = useState({});

      useEffect(() => {
        if (allAvailableColumns.length > 0) {
          setColWidths(allAvailableColumns.reduce((acc, col) => ({ ...acc, [col]: 120 }), {}));
        }
      }, [allAvailableColumns]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (exportRef.current && !exportRef.current.contains(event.target)) {
            setIsExportOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleMouseDown = (col, e) => {
        const startX = e.pageX;
        const startWidth = colWidths[col] || 120;
        const handleMouseMove = (moveEvent) => {
          setColWidths(prev => ({ ...prev, [col]: Math.max(50, startWidth + (moveEvent.pageX - startX)) }));
        };
        const handleMouseUp = () => {
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);
          document.body.style.cursor = 'default';
        };
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        document.body.style.cursor = 'col-resize';
      };

      const filteredData = useMemo(() => {
        return data.filter(item => Object.values(item).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase())));
      }, [data, searchTerm]);

      const handleExport = (type) => {
        const XLSX = window.XLSX;
        const exportData = data.map(row => {
          const filteredRow = {};
          visibleColumns.forEach(col => { filteredRow[col] = row[col]; });
          return filteredRow;
        });
        const wb = XLSX.utils.book_new();
        const fileName = `報表匯出_${new Date().getTime()}`;

        if (type === 'xlsx') {
          const ws = XLSX.utils.json_to_sheet(exportData);
          XLSX.utils.book_append_sheet(wb, ws, 'Data');
          XLSX.writeFile(wb, `${fileName}.xlsx`);
        } else if (type === 'csv') {
          const ws = XLSX.utils.json_to_sheet(exportData);
          XLSX.utils.book_append_sheet(wb, ws, 'Data');
          XLSX.writeFile(wb, `${fileName}.csv`, { bookType: 'csv' });
        } else if (type === 'csv_no_header') {
          const ws = XLSX.utils.json_to_sheet(exportData, { skipHeader: true });
          XLSX.utils.book_append_sheet(wb, ws, 'Data');
          XLSX.writeFile(wb, `${fileName}_純內容.csv`, { bookType: 'csv' });
        }
        setIsExportOpen(false);
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
          <div className="bg-white/80 backdrop-blur-md p-6 rounded-3xl border border-white shadow-xl shadow-slate-200/50 sticky top-4 z-50 space-y-4">
            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="relative flex-1 w-full md:max-w-xs">
                <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                <input type="text" placeholder="搜尋內容..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-slate-100/50 border-transparent focus:bg-white focus:border-indigo-500 rounded-2xl outline-none transition-all font-medium text-sm" />
              </div>

              <div className="relative flex-[2] w-full">
                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none flex items-center gap-2">
                  <Settings2 size={18} />
                  <span className="text-xs font-bold uppercase tracking-widest hidden lg:inline">輸出欄位</span>
                </div>
                <input
                  type="text"
                  placeholder="輸入欄位名稱 (例如: 品名, 數量) - 留空則全顯示"
                  value={columnInput}
                  onChange={(e) => setColumnInput(e.target.value)}
                  className={`w-full pl-32 pr-4 py-3 border-2 rounded-2xl outline-none transition-all font-medium text-sm ${invalidColumns.length > 0 ? 'bg-red-50 border-red-200 focus:border-red-400 text-red-700' : 'bg-indigo-50/30 border-transparent focus:bg-white focus:border-indigo-500'}`}
                />
                {invalidColumns.length > 0 && (
                  <div className="absolute left-0 -bottom-6 flex items-center gap-1 text-[11px] font-bold text-red-500 px-2 animate-in slide-in-from-top-1">
                    <AlertCircle size={12} /> 找不到欄位：{invalidColumns.join(', ')}
                  </div>
                )}
              </div>

              <div className="flex items-center gap-3 w-full md:w-auto">
                <div className="relative" ref={exportRef}>
                  <button onClick={() => setIsExportOpen(!isExportOpen)} className="flex items-center gap-2 px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-semibold hover:bg-indigo-700 transition-all shadow-lg active:scale-95">
                    <Download size={14} /> 下載報表 <ChevronDown size={12} className={isExportOpen ? 'rotate-180' : ''} />
                  </button>

                  {isExportOpen && (
                    <div className="absolute right-0 mt-2 w-36 bg-white rounded-lg shadow-2xl border border-slate-100 z-[60] overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200">
                      <div className="px-4 py-2 bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">選擇匯出格式</div>
                      <button onClick={() => handleExport('xlsx')} className="w-full flex items-center gap-3 px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-indigo-50 transition-colors text-left border-b border-slate-100">
                        <FileSpreadsheet size={12} className="text-emerald-500" /> Excel (.xlsx)
                      </button>
                      <button onClick={() => handleExport('csv')} className="w-full flex items-center gap-3 px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-indigo-50 transition-colors text-left border-b border-slate-100">
                        <FileText size={12} className="text-blue-500" /> CSV (含欄位名稱)
                      </button>
                      <button onClick={() => handleExport('csv_no_header')} className="w-full flex items-center gap-3 px-3 py-1.5 text-xs font-semibold text-indigo-600 hover:bg-indigo-50 transition-colors text-left bg-indigo-50/20">
                        <Hash size={12} className="text-indigo-400" /> CSV (無欄位名稱)
                      </button>
                    </div>
                  )}
                </div>
                <button onClick={onClear} className="p-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all"><Trash2 size={20} /></button>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/40 border border-slate-100 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse table-fixed select-none">
                <thead className="bg-slate-50 border-b border-slate-100 text-slate-400 font-black text-[10px] uppercase tracking-widest">
                  <tr>
                    {visibleColumns.map(col => (
                      <th key={col} className="relative px-6 py-5 group" style={{ width: `${colWidths[col] || 120}px` }}>
                        <div className="truncate pr-2" title={col}>{col}</div>
                        <div onMouseDown={(e) => handleMouseDown(col, e)} className="absolute right-0 top-0 h-full w-1.5 cursor-col-resize hover:bg-indigo-400/50 transition-colors z-10" />
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                  {filteredData.map((row, idx) => (
                    <tr key={idx} className="group hover:bg-indigo-50/30 transition-colors">
                      {visibleColumns.map(col => {
                        const value = row[col];
                        const isNumber = /AMOUNT|數量|LEDGER/i.test(col);
                        const isDate = /DATE|日期|效期/i.test(col);
                        const isTargetDoc = col === '單據編號';
                        return (
                          <td key={col} className={`px-6 py-4 text-sm truncate ${isNumber ? 'text-right' : ''}`} style={{ width: `${colWidths[col] || 120}px` }} title={String(value)}>
                            {isTargetDoc ? (
                              <div className="font-mono text-[11px] text-indigo-600 bg-indigo-50/50 px-2 py-1 rounded truncate border border-indigo-100">{value || '-'}</div>
                            ) : isNumber ? (
                              <span className={`font-black font-mono ${value < 0 ? 'text-red-500' : 'text-slate-700'}`}>{typeof value === 'number' ? value.toLocaleString() : value}</span>
                            ) : isDate ? (
                              <span className="font-mono text-slate-500 bg-slate-50 px-2 py-0.5 rounded border border-slate-100">{value || '-'}</span>
                            ) : (
                              <span className="text-slate-600 font-medium">{value || '-'}</span>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [libsReady, setLibsReady] = useState(false);

      useEffect(() => {
        const loadScript = (src) => new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = src;
          s.async = true;
          s.onload = res;
          s.onerror = rej;
          document.body.appendChild(s);
        });
        Promise.all([loadScript(PAPA_CDN), loadScript(XLSX_CDN)]).then(() => setLibsReady(true)).catch(console.error);
      }, []);

      const processRawData = useCallback((rawData) => {
        if (rawData.length === 0) return [];
        const keys = Object.keys(rawData[0]);
        return rawData.map((row) => {
          const newRow = { ...row };
          keys.forEach(key => {
            if (/DATE|日期|效期/i.test(key)) newRow[key] = Utils.formatDate(row[key]);
            else if (/AMOUNT|數量|LEDGER/i.test(key)) newRow[key] = Utils.formatNumber(row[key]);
            else if (key === '單據編號') newRow[key] = Utils.formatDocId(row[key]);
          });
          return newRow;
        });
      }, []);

      const handleFileProcessing = async (file) => {
        setLoading(true);
        const ext = file.name.split('.').pop()?.toLowerCase();
        const reader = new FileReader();

        reader.onload = (e) => {
          try {
            if (ext === 'csv') {
              window.Papa.parse(e.target?.result, {
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                  setData(processRawData(results.data || []));
                  setLoading(false);
                },
                error: () => setLoading(false)
              });
            } else {
              const wb = window.XLSX.read(e.target?.result, { type: 'buffer' });
              const rawJson = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
              setData(processRawData(rawJson));
              setLoading(false);
            }
          } catch (err) {
            console.error(err);
            setLoading(false);
          }
        };

        if (ext === 'csv') reader.readAsText(file);
        else reader.readAsArrayBuffer(file);
      };

      return (
        <div className="min-h-screen bg-slate-50 p-6 md:p-12 font-sans text-slate-900 text-[15px]">
          <div className="max-w-full mx-auto space-y-10 px-4">
            <header className="flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="space-y-1">
                <h1 className="text-4xl font-black tracking-tight flex items-center gap-4 text-slate-900">
                  <div className="p-3 bg-indigo-600 text-white rounded-2xl shadow-xl shadow-indigo-200"><TableIcon size={32} /></div>
                  藍田庫存異動紀錄
                </h1>
                <p className="text-slate-400 font-bold ml-1 flex items-center gap-2 uppercase tracking-widest text-[11px]">v1.6.3 Updated</p>
              </div>

              {data.length > 0 && (
                <div className="flex items-center gap-6 bg-white px-8 py-4 rounded-2xl border border-slate-200 shadow-sm animate-in zoom-in">
                  <div className="text-center border-r border-slate-100 pr-6">
                    <div className="text-[10px] font-black text-slate-300 uppercase tracking-tighter">資料筆數</div>
                    <div className="text-2xl font-black text-indigo-600 leading-none">{data.length}</div>
                  </div>
                  <div className="flex items-center gap-2 text-sm font-black text-emerald-500"><CheckCircle2 size={16} /> 功能已就緒</div>
                </div>
              )}
            </header>

            <main>
              {data.length === 0 ? <Dropzone onFileSelect={handleFileProcessing} loading={loading} ready={libsReady} /> : <DataView data={data} onClear={() => setData([])} />}
            </main>

            <footer className="pt-10 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] font-black text-slate-300 uppercase tracking-widest">
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-2"><Database size={14} /> 安全下載模式</div>
                <div className="flex items-center gap-2"><ArrowRight size={14} /> 支援格式化輸出</div>
              </div>
              <div>Developed by Tool Design Architect</div>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
